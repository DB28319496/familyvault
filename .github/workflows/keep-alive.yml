name: Supabase Keep-Alive

# Free-tier Supabase projects auto-pause after 7 days of inactivity.
# This runs a real database query daily to reset the inactivity timer.
# Note: GitHub disables scheduled workflows after 60 days of no repo
# activity — push/commit occasionally, or re-enable it in the Actions tab.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to reset inactivity timer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "::error::Keep-alive query failed (HTTP $status)"
            exit 1
          fi
          echo "Keep-alive succeeded — inactivity timer reset."
